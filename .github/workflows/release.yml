name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin stepshots

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="stepshots-v${VERSION}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/stepshots" "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            stepshots-*.tar.gz
            stepshots-*.tar.gz.sha256

  build-extension:
    name: Build Chrome extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install and build
        working-directory: extension
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Package zip
        working-directory: extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="../stepshots-extension-v${VERSION}.zip"
          zip -r "$ZIP" manifest.json icons dist src/panel/panel.html src/panel/panel.css -x "*.DS_Store"
          shasum -a 256 "$ZIP" > "${ZIP}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: |
            stepshots-extension-*.zip
            stepshots-extension-*.zip.sha256

  release:
    name: Create GitHub Release
    needs: [build-cli, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
